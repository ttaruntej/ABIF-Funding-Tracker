name: Overnight Deep Intelligence Scan

on:
  schedule:
    # Runs at 02:00 UTC (7:30 AM IST) every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub for testing

permissions:
  contents: write

jobs:
  deep-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180 # Allow up to 3 hours for deep processing

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Deep Scraper
        run: node scripts/deep-scraper.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit Scraped Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/opportunities.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore(data): overnight deep intelligence scan update"
          git push
